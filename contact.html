<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIRO Style - تواصل معنا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --overlay-bg: rgba(255, 255, 255, 0.2);
            --item-bg: rgba(255, 255, 255, 0.9);
            --text-color: #333;
            --title-color: white;
        }

        /* تعديلات الوضع الليلي */
        [data-theme="dark"] {
            --overlay-bg: rgba(0, 0, 0, 0.5);
            --item-bg: rgba(30, 30, 30, 0.95);
            --text-color: #f4ece2;
            --title-color: #d4a373;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: 0.3s; }
        
        body { 
            background-image: url('cover.png'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        /* زر تبديل الوضع الليلي */
        .theme-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #a67c52;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .contact-box { 
            background: var(--overlay-bg); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            padding: 40px; 
            border-radius: 25px; 
            width: 90%; 
            max-width: 450px; 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 { color: var(--title-color); margin-bottom: 30px; font-size: 28px; }

        .contact-item {
            display: flex;
            align-items: center;
            background: var(--item-bg);
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            transition: 0.3s;
        }

        .contact-item:hover { transform: scale(1.05); filter: brightness(1.1); }
        .contact-item i { font-size: 24px; margin-left: 15px; width: 30px; }
        .contact-item span { font-weight: bold; color: var(--text-color); font-size: 18px; }
        
        /* ألوان الأيقونات ثابتة للبراندات */
        .fa-whatsapp { color: #25D366; }
        .fa-facebook { color: #1877F2; }
        .fa-telegram { color: #0088cc; }
        
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: var(--title-color);
            text-decoration: none;
            font-size: 14px;
            border-bottom: 1px solid var(--title-color);
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">
        <i id="theme-icon" class="fas fa-moon"></i>
    </button>

    <div class="contact-box">
        <h2>تواصل مع FIRO Style</h2>
        
        <a href="https://wa.me/201557671143" target="_blank" class="contact-item">
            <i class="fa-brands fa-whatsapp"></i>
            <span>واتساب</span>
        </a>

        <a href="https://web.facebook.com/FIROSTYLE1?locale=ar_AR" target="_blank" class="contact-item">
            <i class="fa-brands fa-facebook"></i>
            <span>فيسبوك</span>
        </a>

        <a href="https://t.me/FIROGIST" target="_blank" class="contact-item">
            <i class="fa-brands fa-telegram"></i>
            <span>تليجرام</span>
        </a>

        <a href="home.html" class="back-btn">العودة للمعرض</a>
    </div>

    <script>
        function toggleTheme() {
            const body = document.documentElement;
            const icon = document.getElementById('theme-icon');
            
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                icon.className = 'fas fa-moon';
                localStorage.setItem('theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.className = 'fas fa-sun';
                localStorage.setItem('theme', 'dark');
            }
        }

        // تطبيق الوضع المحفوظ عند التحميل
        window.onload = () => {
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('theme-icon').className = 'fas fa-sun';
            }
        };
    </script>
</body>
</html>
