<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة المشتريات - FIRO Style</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #a67c52;
            --bg: #fdfaf7;
            --card-bg: #ffffff;
            --text-color: #333;
            --border-color: #eee;
        }

        [data-theme="dark"] {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text-color: #f4ece2;
            --border-color: rgba(128, 128, 128, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg); color: var(--text-color); padding: 20px; }

        .cart-container {
            max-width: 800px;
            margin: 50px auto;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .cart-item img { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; }

        .item-details { flex: 1; }
        .item-details h3 { font-size: 18px; }
        .item-details p { color: var(--primary); font-weight: bold; }

        .remove-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .cart-total {
            margin-top: 20px;
            text-align: left;
            font-size: 22px;
            font-weight: bold;
        }

        .checkout-btn {
            display: block;
            width: 100%;
            background: #25d366;
            color: white;
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
        }

        .empty-cart { text-align: center; padding: 50px; display: none; }
        .back-link { display: inline-block; margin-bottom: 20px; color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>

    <div class="cart-container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للمتجر</a>
        <h1>سلة المشتريات <i class="fas fa-shopping-basket"></i></h1>
        
        <div id="cart-items-wrapper">
            </div>

        <div id="empty-msg" class="empty-cart">
            <i class="fas fa-shopping-cart fa-3x" style="color: #ccc; margin-bottom: 15px;"></i>
            <p>السلة فارغة حالياً</p>
        </div>

        <div class="cart-total" id="total-section" style="display: none;">
            الإجمالي: <span id="cart-total-price">0</span> جنيه
            <a href="#" onclick="checkoutWhatsApp()" class="checkout-btn">تأكيد الطلب عبر واتساب</a>
        </div>
    </div>

    <script src="cart.js"></script>
    <script>
        // كود بسيط لعرض المنتجات عند فتح الصفحة
        window.onload = () => {
            displayCart();
            // تفعيل الثيم المحفوظ
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        };

        function displayCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const wrapper = document.getElementById('cart-items-wrapper');
            const totalSection = document.getElementById('total-section');
            const emptyMsg = document.getElementById('empty-msg');
            let total = 0;

            if (cart.length === 0) {
                wrapper.innerHTML = '';
                totalSection.style.display = 'none';
                emptyMsg.style.display = 'block';
                return;
            }

            emptyMsg.style.display = 'none';
            totalSection.style.display = 'block';
            wrapper.innerHTML = cart.map((item, index) => {
                total += item.price;
                return `
                    <div class="cart-item">
                        <img src="${item.image}" alt="${item.name}">
                        <div class="item-details">
                            <h3>${item.name}</h3>
                            <p>${item.price} جنيه</p>
                        </div>
                        <button class="remove-btn" onclick="removeItem(${index})"><i class="fas fa-trash"></i></button>
                    </div>
                `;
            }).join('');

            document.getElementById('cart-total-price').innerText = total;
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            displayCart();
        }

        function checkoutWhatsApp() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            let message = "مرحباً FIRO Style، أريد طلب المنتجات التالية:\n\n";
            let total = 0;

            cart.forEach((item, i) => {
                message += `${i+1}- ${item.name} (${item.price} جنيه)\n`;
                total += item.price;
            });

            message += `\nإجمالي المبلغ: ${total} جنيه\nأرجو التواصل لتأكيد البيانات.`;
            
            const encodedMessage = encodeURIComponent(message);
            window.open(`https://wa.me/201557671143?text=${encodedMessage}`, '_blank');
        }
    </script>
</body>
</html>
